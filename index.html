<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 马克老王策略组合跟踪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf, #ff006e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            margin-bottom: 10px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .update-time {
            color: #888;
            font-size: 0.9em;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .portfolio-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.1);
        }

        .portfolio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .portfolio-name {
            font-size: 1.3em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .portfolio-icon {
            font-size: 1.5em;
        }

        .market-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .market-us { background: linear-gradient(45deg, #00d4ff, #0099cc); }
        .market-cn { background: linear-gradient(45deg, #ff006e, #ff4d94); }
        .market-hk { background: linear-gradient(45deg, #7b2cbf, #9d4edd); }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .stock-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .stock-info {
            flex: 1;
        }

        .stock-name {
            font-weight: bold;
            font-size: 1.05em;
            margin-bottom: 4px;
        }

        .stock-code {
            color: #888;
            font-size: 0.85em;
        }

        .stock-ratio {
            text-align: right;
            margin-right: 15px;
        }

        .ratio-bar {
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .ratio-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .ratio-text {
            font-size: 0.8em;
            color: #888;
        }

        .stock-pnl {
            text-align: right;
            min-width: 100px;
        }

        .pnl-value {
            font-weight: bold;
            font-size: 1.1em;
        }

        .pnl-positive { color: #00ff88; }
        .pnl-negative { color: #ff4757; }

        .pnl-label {
            font-size: 0.75em;
            color: #666;
        }

        .alert-section {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(123, 44, 191, 0.1));
            border: 1px solid rgba(255, 0, 110, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .alert-badge {
            background: #ff006e;
            color: white;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .alert-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 0, 110, 0.1);
            border-radius: 12px;
            border-left: 4px solid #ff006e;
        }

        .alert-icon {
            font-size: 1.5em;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .alert-desc {
            color: #aaa;
            font-size: 0.9em;
        }

        .alert-time {
            color: #666;
            font-size: 0.8em;
        }

        .refresh-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .summary-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .summary-label {
            color: #888;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8em; }
            .stock-item { flex-wrap: wrap; }
            .stock-pnl { width: 100%; text-align: left; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 马克老王策略组合跟踪</h1>
            <p class="update-time">最后更新: <span id="updateTime">--</span></p>
        </header>

        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-value" style="color: #00d4ff;">5</div>
                <div class="summary-label">策略组合</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" style="color: #00ff88;">16</div>
                <div class="summary-label">持仓标的</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" style="color: #ff006e;">3</div>
                <div class="summary-label">市场分布</div>
            </div>
            <div class="summary-card">
                <div class="summary-value" style="color: #ffd93d;">--</div>
                <div class="summary-label">调仓提醒</div>
            </div>
        </div>

        <div class="portfolio-grid" id="portfolioGrid">
            <!-- 组合卡片将通过JS生成 -->
        </div>

        <div class="alert-section">
            <div class="alert-header">
                🔔 调仓提醒
                <span class="alert-badge" id="alertCount">0</span>
            </div>
            <div class="alert-list" id="alertList">
                <div class="alert-item">
                    <span class="alert-icon">ℹ️</span>
                    <div class="alert-content">
                        <div class="alert-title">暂无调仓提醒</div>
                        <div class="alert-desc">系统会自动检测持仓变化并在此提醒</div>
                    </div>
                </div>
            </div>
        </div>

        <button class="refresh-btn" onclick="refreshData()">
            🔄 刷新数据
        </button>
    </div>

    <script>
        // 组合配置
        const portfolios = [
            {
                id: 108131,
                name: "美股多头趋势策略",
                icon: "📈",
                market: "美股",
                marketClass: "market-us"
            },
            {
                id: 158919,
                name: "A股多头趋势策略",
                icon: "🚀",
                market: "沪深",
                marketClass: "market-cn"
            },
            {
                id: 154216,
                name: "美股对冲策略",
                icon: "⚖️",
                market: "美股",
                marketClass: "market-us"
            },
            {
                id: 167429,
                name: "港股多头趋势策略",
                icon: "🎯",
                market: "港股",
                marketClass: "market-hk"
            },
            {
                id: 137583,
                name: "A股ETF策略",
                icon: "📊",
                market: "沪深",
                marketClass: "market-cn"
            }
        ];

        // 当前持仓数据（初始数据）
        const initialData = {
            108131: {
                stocks: [
                    { code: "CF", name: "CF工业控股", ratio: 21.57, pnl: -1.89 },
                    { code: "LYB", name: "利安德巴塞尔", ratio: 14.16, pnl: 2.11 },
                    { code: "EWY", name: "韩国ETF-iShares MSCI", ratio: 23.75, pnl: -1.40 },
                    { code: "SQQQ", name: "三倍做空纳指ETF", ratio: 12.02, pnl: 1.68 },
                    { code: "SOXS", name: "三倍做空半导体ETF", ratio: 28.50, pnl: 6.82 }
                ]
            },
            158919: {
                stocks: [
                    { code: "601611", name: "中国核建", ratio: 50.15, pnl: 0.13 },
                    { code: "300442", name: "润泽科技", ratio: 11.07, pnl: -10.48 },
                    { code: "001280", name: "中国铀业", ratio: 38.78, pnl: -1.99 }
                ]
            },
            154216: {
                stocks: [
                    { code: "CF", name: "CF工业控股", ratio: 37.56, pnl: -3.48 },
                    { code: "SOXS", name: "三倍做空半导体ETF", ratio: 62.44, pnl: 8.01 }
                ]
            },
            167429: {
                stocks: [
                    { code: "00700", name: "腾讯控股", ratio: 32.23, pnl: 2.04 },
                    { code: "07709", name: "南方两倍做多海力士", ratio: 10.18, pnl: -21.48 },
                    { code: "00100", name: "MINIMAX-WP", ratio: 33.68, pnl: 10.56 },
                    { code: "03986", name: "兆易创新", ratio: 23.89, pnl: -1.51 }
                ]
            },
            137583: {
                stocks: [
                    { code: "516010", name: "游戏ETF", ratio: 50.19, pnl: 0.14 },
                    { code: "588200", name: "科创芯片ETF", ratio: 49.81, pnl: 1.99 }
                ]
            }
        };

        // 保存历史数据用于对比
        let historicalData = JSON.parse(localStorage.getItem('portfolioHistory')) || {};
        let currentData = JSON.parse(JSON.stringify(initialData));

        // 更新页面
        function renderPortfolios() {
            const grid = document.getElementById('portfolioGrid');
            grid.innerHTML = '';

            portfolios.forEach(portfolio => {
                const data = currentData[portfolio.id];
                if (!data) return;

                const card = document.createElement('div');
                card.className = 'portfolio-card';
                
                const stocksHtml = data.stocks.map(stock => {
                    const pnlClass = stock.pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                    const pnlIcon = stock.pnl >= 0 ? '📈' : '📉';
                    const ratioPercent = Math.min(stock.ratio, 100);
                    const gradientColor = stock.pnl >= 0 ? 
                        'linear-gradient(90deg, #00ff88, #00d4ff)' : 
                        'linear-gradient(90deg, #ff4757, #ff006e)';

                    return `
                        <div class="stock-item">
                            <div class="stock-info">
                                <div class="stock-name">${stock.name}</div>
                                <div class="stock-code">${stock.code}</div>
                            </div>
                            <div class="stock-ratio">
                                <div class="ratio-bar">
                                    <div class="ratio-fill" style="width: ${ratioPercent}%; background: ${gradientColor};"></div>
                                </div>
                                <div class="ratio-text">${stock.ratio.toFixed(2)}%</div>
                            </div>
                            <div class="stock-pnl">
                                <div class="pnl-value ${pnlClass}">${pnlIcon} ${stock.pnl >= 0 ? '+' : ''}${stock.pnl.toFixed(2)}%</div>
                                <div class="pnl-label">盈亏</div>
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="portfolio-header">
                        <div class="portfolio-name">
                            <span class="portfolio-icon">${portfolio.icon}</span>
                            ${portfolio.name}
                        </div>
                        <span class="market-badge ${portfolio.marketClass}">${portfolio.market}</span>
                    </div>
                    <div class="stock-list">
                        ${stocksHtml}
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 检查调仓变化
        function checkChanges() {
            const alerts = [];
            
            portfolios.forEach(portfolio => {
                const current = currentData[portfolio.id];
                const history = historicalData[portfolio.id];
                
                if (history && history.stocks) {
                    // 检查新增/删除的股票
                    const currentCodes = current.stocks.map(s => s.code);
                    const historyCodes = history.stocks.map(s => s.code);
                    
                    const added = currentCodes.filter(c => !historyCodes.includes(c));
                    const removed = historyCodes.filter(c => !currentCodes.includes(c));
                    
                    added.forEach(code => {
                        const stock = current.stocks.find(s => s.code === code);
                        alerts.push({
                            type: 'add',
                            portfolio: portfolio.name,
                            stock: stock.name,
                            code: stock.code,
                            time: new Date().toLocaleString('zh-CN')
                        });
                    });
                    
                    removed.forEach(code => {
                        const stock = history.stocks.find(s => s.code === code);
                        alerts.push({
                            type: 'remove',
                            portfolio: portfolio.name,
                            stock: stock.name,
                            code: stock.code,
                            time: new Date().toLocaleString('zh-CN')
                        });
                    });
                    
                    // 检查仓位大幅变化 (>5%)
                    current.stocks.forEach(currStock => {
                        const histStock = history.stocks.find(s => s.code === currStock.code);
                        if (histStock) {
                            const ratioDiff = Math.abs(currStock.ratio - histStock.ratio);
                            if (ratioDiff > 5) {
                                alerts.push({
                                    type: 'change',
                                    portfolio: portfolio.name,
                                    stock: currStock.name,
                                    code: currStock.code,
                                    oldRatio: histStock.ratio,
                                    newRatio: currStock.ratio,
                                    time: new Date().toLocaleString('zh-CN')
                                });
                            }
                        }
                    });
                }
            });

            renderAlerts(alerts);
            
            // 保存当前数据为历史
            historicalData = JSON.parse(JSON.stringify(currentData));
            localStorage.setItem('portfolioHistory', JSON.stringify(historicalData));
        }

        // 渲染提醒
        function renderAlerts(alerts) {
            const alertList = document.getElementById('alertList');
            const alertCount = document.getElementById('alertCount');
            
            alertCount.textContent = alerts.length;
            
            if (alerts.length === 0) {
                alertList.innerHTML = `
                    <div class="alert-item">
                        <span class="alert-icon">ℹ️</span>
                        <div class="alert-content">
                            <div class="alert-title">暂无调仓提醒</div>
                            <div class="alert-desc">系统会自动检测持仓变化并在此提醒</div>
                        </div>
                    </div>
                `;
                return;
            }

            alertList.innerHTML = alerts.map(alert => {
                let icon, title, desc;
                
                if (alert.type === 'add') {
                    icon = '🟢';
                    title = `【${alert.portfolio}】新增持仓`;
                    desc = `${alert.stock} (${alert.code})`;
                } else if (alert.type === 'remove') {
                    icon = '🔴';
                    title = `【${alert.portfolio}】清仓`;
                    desc = `${alert.stock} (${alert.code})`;
                } else {
                    icon = '🟡';
                    title = `【${alert.portfolio}】仓位调整`;
                    desc = `${alert.stock}: ${alert.oldRatio.toFixed(2)}% → ${alert.newRatio.toFixed(2)}%`;
                }

                return `
                    <div class="alert-item">
                        <span class="alert-icon">${icon}</span>
                        <div class="alert-content">
                            <div class="alert-title">${title}</div>
                            <div class="alert-desc">${desc}</div>
                        </div>
                        <div class="alert-time">${alert.time}</div>
                    </div>
                `;
            }).join('');
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 刷新中...';

            // 模拟API调用（实际使用时替换为真实API）
            const timestamp = Date.now();
            const portfolioIds = [108131, 158919, 154216, 167429, 137583];
            
            try {
                // 这里应该调用真实的API
                // 目前使用模拟数据，实际使用时取消下面的注释并修改
                /*
                for (const id of portfolioIds) {
                    const response = await fetch(`https://portfolio.futunn.com/portfolio-api/get-portfolio-position?portfolio_id=${id}&language=0&_=${timestamp}`);
                    const data = await response.json();
                    if (data.code === 0) {
                        currentData[id].stocks = data.data.record_items.map(item => ({
                            code: item.stock_code,
                            name: item.stock_name,
                            ratio: item.position_ratio / 10000000,
                            pnl: item.profit_and_loss_ratio / 1000000
                        }));
                    }
                }
                */

                // 模拟数据变化（测试用）
                simulateDataChange();
                
                checkChanges();
                renderPortfolios();
                
                document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('刷新失败:', error);
                alert('刷新失败，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔄 刷新数据';
            }
        }

        // 模拟数据变化（用于测试调仓提醒功能）
        function simulateDataChange() {
            // 随机微调盈亏
            portfolios.forEach(portfolio => {
                currentData[portfolio.id].stocks.forEach(stock => {
                    stock.pnl += (Math.random() - 0.5) * 0.5;
                });
            });
        }

        // 初始化
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        renderPortfolios();
        checkChanges();

        // 自动刷新（每30秒）
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
